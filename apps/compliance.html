<script>
/* ===== Patched screening functions for compliance.html ===== */

/* Guard: if weconnectai.js failed to load, show a clear message */
function _wcEnsureLoaded() {
  if (typeof window.wcCallAI !== 'function') {
    const out = document.getElementById('result')
            || document.getElementById('results')
            || document.getElementById('output')
            || document.getElementById('screeningResult');
    if (out) {
      out.innerHTML = '<div class="error-box" style="padding:16px;border:1px solid #c33;background:#fee;color:#900;border-radius:6px;">'
        + '⚠️ <strong>Módulo weconnectai.js não carregou.</strong><br>'
        + 'Tente: <kbd>Ctrl+Shift+R</kbd> (hard refresh) ou verifique se o ficheiro <code>weconnectai.js</code> foi deployado.'
        + '</div>';
    }
    console.error('wcCallAI is not a function. weconnectai.js probably has a syntax error or was not deployed.');
    return false;
  }
  return true;
}

/* Run the screening */
async function runScreening() {
  if (!_wcEnsureLoaded()) return;

  const form = document.getElementById('screeningForm') || document.querySelector('form');
  const out  = document.getElementById('result')
            || document.getElementById('results')
            || document.getElementById('output')
            || document.getElementById('screeningResult');
  if (!out) { console.error('No result element found'); return; }

  // Collect form data
  const data = {};
  if (form) {
    new FormData(form).forEach((v, k) => { if (v) data[k] = v; });
  } else {
    document.querySelectorAll('input, select, textarea').forEach(el => {
      if (el.name) data[el.name] = el.value;
    });
  }

  // Show loading state
  out.innerHTML = '<p>⏳ A processar triagem…</p>';

  try {
    const systemPrompt = 'És um engenheiro civil especialista em licenciamento e fiscalização no Algarve, Portugal. Analisa o projeto descrito e devolve uma triagem preliminar em português, listando pontos críticos, riscos e próximos passos. Responde em texto simples, não em JSON.';
    const userContent  = 'Projeto:\n' + Object.entries(data).map(([k,v]) => `- ${k}: ${v}`).join('\n');

    const result = await window.wcCallAI(systemPrompt, userContent);

    // Render
    out.innerHTML = ''
      + '<div class="result-card" style="background:#f6f8fa;border:1px solid #d0d7de;border-radius:8px;padding:16px;margin-top:16px;">'
      + '<h3 style="margin:0 0 12px 0;color:#1B2A45;">Resultado da Triagem</h3>'
      + '<div class="result-body" style="white-space:pre-wrap;line-height:1.6;">'
      + (result || '').replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))
      + '</div>'
      + '</div>';

    // Save to history
    _wcSaveToHistory({ ts: Date.now(), data, summary: (result || '').slice(0, 500) });

    // Refresh history panel
    if (typeof loadHistory === 'function') loadHistory();
  } catch (e) {
    out.innerHTML = '<div class="error-box" style="padding:16px;border:1px solid #c33;background:#fee;color:#900;border-radius:6px;">'
      + '❌ Erro: ' + e.message + '</div>';
  }
}

/* Save screening to local history */
function _wcSaveToHistory(entry) {
  try {
    if (window.wcStore && typeof window.wcStore.set === 'function') {
      // Use the new wcStore API (scoped keys)
      const key = 'screening:' + new Date(entry.ts).toISOString();
      window.wcStore.set(key, entry);
    } else {
      // Fallback to legacy direct localStorage
      const raw = localStorage.getItem('screeningHistory');
      const data = raw ? JSON.parse(raw) : { list: [] };
      data.list = data.list || [];
      data.list.unshift(entry);
      data.list = data.list.slice(0, 20); // keep last 20
      localStorage.setItem('screeningHistory', JSON.stringify(data));
    }
  } catch (e) {
    console.warn('saveToHistory failed', e);
  }
}

/* Load history (defensive version — works with both old and new storage) */
function loadHistory() {
  const listEl = document.getElementById('historyList');
  if (!listEl) return;
  let items = [];
  try {
    if (window.wcStore && typeof window.wcStore.list === 'function') {
      const keys = window.wcStore.list('screening:');
      items = keys.map(k => {
        const v = window.wcStore.get(k);
        return v && typeof v === 'object' ? v : null;
      }).filter(Boolean);
    } else {
      const raw = localStorage.getItem('screeningHistory');
      const data = raw ? JSON.parse(raw) : null;
      items = (data && Array.isArray(data.list)) ? data.list : [];
    }
  } catch (e) {
    console.log('loadHistory: no history yet', e);
    items = [];
  }
  if (items.length === 0) {
    listEl.innerHTML = '<p class="muted" style="color:#666;font-style:italic;">Sem histórico. As suas últimas triagens aparecerão aqui.</p>';
    return;
  }
  listEl.innerHTML = items.map((it, i) =>
    '<div class="hist-item" data-idx="' + i + '" '
    + 'style="padding:10px;border-bottom:1px solid #eee;cursor:pointer;" '
    + 'onclick="this.querySelector(\'.hist-detail\').classList.toggle(\'hidden\')">'
    + '<div class="hist-meta" style="font-size:12px;color:#666;">'
    + new Date(it.ts || Date.now()).toLocaleString('pt-PT')
    + '</div>'
    + '<div class="hist-summary" style="margin-top:4px;">'
    + (it.summary || it.result || JSON.stringify(it.data || {})).toString().slice(0, 200)
    + '</div>'
    + '<div class="hist-detail hidden" style="margin-top:8px;padding:8px;background:#f6f8fa;border-radius:4px;white-space:pre-wrap;">'
    + JSON.stringify(it.data || {}, null, 2)
    + '</div>'
    + '</div>'
  ).join('');
}

/* Run loadHistory on page load if the element exists */
document.addEventListener('DOMContentLoaded', function () {
  if (typeof loadHistory === 'function' && document.getElementById('historyList')) {
    loadHistory();
  }
});
</script>
